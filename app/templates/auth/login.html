<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login — HR ERP</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a237e 0%, #283593 50%, #00bcd4 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: white; border-radius: 16px; padding: 40px 36px;
      width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo .icon { width: 60px; height: 60px; background: #1a237e; border-radius: 16px;
      display: inline-flex; align-items: center; justify-content: center; color: white; font-size: 26px; margin-bottom: 12px; }
    .login-logo h2 { font-size: 22px; font-weight: 700; color: #1a237e; }
    .login-logo p { font-size: 13px; color: #888; margin-top: 4px; }
    label { font-size: 13px; font-weight: 500; color: #555; margin-bottom: 5px; display: block; }
    input {
      width: 100%; padding: 11px 14px 11px 38px; border: 1.5px solid #dde1ee;
      border-radius: 8px; font-size: 14px; outline: none; transition: border 0.2s; margin-bottom: 18px;
    }
    input:focus { border-color: #3949ab; }
    .input-wrap { position: relative; }
    .input-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 14px; }
    .btn-login {
      width: 100%; padding: 12px; background: #1a237e; color: white; border: none;
      border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .btn-login:hover { background: #283593; }
    .flash { padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; background: #fce4ec; color: #c62828; border-left: 3px solid #e74c3c; }

  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="icon"><i class="fas fa-building"></i></div>
      <h2>HR & BD ERP</h2>
      <p>Sign in to your account</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST">
      <label>Username</label>
      <div class="input-wrap">
        <i class="fas fa-user"></i>
        <input type="text" name="username" placeholder="Enter username" required>
      </div>
      <label>Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" name="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn-login">Sign In</button>
    </form>
</div>
</body>
</html>
